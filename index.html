<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>전시장 안내 시스템</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page-mode="user">
  <!-- 1. 사용자 화면 상단 -->
  <header class="topbar">
    <div>
      <h1>전시장 안내 시스템</h1>
      <p>기업명·부스번호·품목·편의시설 검색</p>
    </div>
    <div class="header-actions">
      <button id="resetBtn" type="button">초기화</button>
    </div>
  </header>

  <!-- 2. 사용자 길찾기 영역: 왼쪽 검색 → 오른쪽 지도 -->
  <main class="layout">
    <aside class="panel" aria-label="길찾기 검색">
      <section id="wayfindingSearchCard" class="wayfinding-search-card">
        <div class="start-location-section wayfinding-search-part">
          <label for="startSelect">현재 위치</label>
          <select id="startSelect"></select>
        </div>

        <div class="destination-search-section wayfinding-search-part">
          <label for="searchInput">목적지 검색</label>
          <input id="searchInput" type="search" placeholder="예: 선크림, 기업명, A-101, 안내소" autocomplete="off" />
          <div id="results" class="results" aria-live="polite"></div>
        </div>

        <div id="selectedCard" class="selected-card hidden">
          <h2 id="selectedName"></h2>
          <p id="selectedMeta"></p>
          <button id="routeBtn" type="button">길찾기</button>
        </div>
      </section>
    </aside>

    <section class="map-wrap" aria-label="전시장 지도">
      <div class="map-toolbar">
        <strong>1층 플로어맵</strong>
        <div class="map-actions" aria-label="지도 확대 및 축소">
          <button id="zoomOutBtn" type="button" aria-label="축소">−</button>
          <button id="fitBtn" type="button">전체보기</button>
          <button id="zoomInBtn" type="button" aria-label="확대">＋</button>
        </div>
      </div>

      <div class="map-viewport">
        <svg id="floorMap" viewBox="0 0 1000 650" role="img" aria-label="전시장 플로어맵">
          <!-- 배경 도면 → 샘플 지도 → 부스 → 시설 → 길찾기 경로 → 출발·도착 표식 순서 -->
          <image id="floorPlanImage" x="0" y="0" width="1000" height="650" preserveAspectRatio="xMidYMid meet" />
          <g id="sampleMapLayer">
            <rect x="20" y="20" width="960" height="610" rx="18" class="hall" />
            <g class="aisles">
              <rect x="80" y="80" width="840" height="90" />
              <rect x="80" y="280" width="840" height="90" />
              <rect x="80" y="480" width="840" height="90" />
              <rect x="180" y="70" width="80" height="510" />
              <rect x="460" y="70" width="80" height="510" />
              <rect x="740" y="70" width="80" height="510" />
            </g>
          </g>
          <g id="boothsLayer"></g>
          <g id="facilitiesLayer"></g>
          <polyline id="routeLine" class="route-line" points="" />
          <circle id="startMarker" class="start-marker" r="11" />
          <circle id="destinationMarker" class="destination-marker" r="11" />
        </svg>
      </div>

      <div class="map-status">
        <span id="routeInfo">목적지를 선택해 주세요.</span>
        <span class="gesture-hint">두 손가락으로 확대·축소, 한 손가락으로 이동</span>
      </div>
    </section>
  </main>

  <!-- 3. 스크립트 로딩: 공통 기반 → 데이터 → 지도 → 엑셀 → 앱 -->
  <script src="js/core/utils.js"></script>
  <script src="js/core/config.js"></script>
  <script src="js/ui/renderers.js"></script>
  <script src="js/core/storage.js"></script>
  <script src="js/data/project-state.js"></script>
  <script src="js/project/project-io.js"></script>
  <script src="js/data/validators.js"></script>
  <script src="js/map/viewport-controller.js"></script>
  <script src="jszip.min.js"></script>
  <script src="xlsx-grid.js"></script>

  <!-- 애플리케이션 기능 모듈: 의존 순서대로 로드 -->
  <script src="js/core/app-core.js"></script>
  <script src="js/routing/route-system.js"></script>
  <script src="js/booths/booth-system.js"></script>
  <script src="js/navigation/destination-search.js"></script>
  <script src="js/locations/location-manager.js"></script>
  <script src="js/navigation/navigation-engine.js"></script>
  <script src="js/data/import-manager.js"></script>
  <script src="app.js"></script>
</body>
</html>
