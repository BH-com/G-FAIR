<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FINDER MapLibre 길찾기·특별부스 시험본</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
<style>
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Arial,"Noto Sans KR",sans-serif;background:#edf2f7;color:#10233c}
button,input{font:inherit}.app{height:100%;display:flex;flex-direction:column}.top{position:relative;z-index:10;background:#183f70;color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 2px 12px #0002}.top h1{font-size:17px;margin:0;margin-right:auto;white-space:nowrap}.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.search-box{position:relative}.controls button,.controls input{height:36px;border:1px solid #c7d2df;border-radius:8px;background:#fff;color:#10233c;padding:0 10px}.controls button{font-weight:800;cursor:pointer}.controls button:hover{background:#f3f7fb}.controls input{width:240px}.results{display:none;position:absolute;top:40px;left:0;width:min(360px,80vw);max-height:300px;overflow:auto;background:#fff;color:#10233c;border:1px solid #cad5e2;border-radius:10px;box-shadow:0 12px 30px #0003}.results.open{display:block}.result{padding:9px 11px;border-bottom:1px solid #e8edf3;cursor:pointer}.result:last-child{border-bottom:0}.result:hover,.result.active{background:#eef5ff}.result b{font-size:13px}.result span{display:block;color:#657386;font-size:11px;margin-top:2px}.wrap{position:relative;flex:1;min-height:0}.map{position:absolute;inset:0}.status{position:absolute;left:12px;bottom:12px;z-index:5;background:rgba(255,255,255,.94);padding:8px 10px;border-radius:9px;box-shadow:0 2px 12px #0002;font-size:12px;max-width:480px}.legend{position:absolute;left:12px;top:12px;z-index:5;background:rgba(255,255,255,.95);padding:9px 11px;border-radius:10px;box-shadow:0 2px 12px #0002;font-size:12px;line-height:1.55}.legend strong{display:block;margin-bottom:2px}.panel{position:absolute;right:12px;bottom:12px;z-index:6;width:300px;max-width:calc(100vw - 24px);background:rgba(255,255,255,.97);border-radius:14px;box-shadow:0 10px 34px #0003;padding:14px;transform:translateY(calc(100% + 24px));opacity:0;transition:.22s ease;pointer-events:none}.panel.open{transform:translateY(0);opacity:1;pointer-events:auto}.panel-close{position:absolute;right:8px;top:8px;width:30px;height:30px;border:0;border-radius:50%;background:#edf2f7;cursor:pointer;font-weight:900}.panel .eyebrow{font-size:11px;color:#6c7b8e;font-weight:800}.panel h2{font-size:22px;margin:4px 38px 4px 0;color:#173c6b}.panel .company{font-size:15px;font-weight:800;margin:2px 0 6px}.panel .category{display:inline-block;background:#eaf2ff;color:#1d5aa2;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}.panel-actions{display:flex;gap:7px;margin-top:12px}.panel-actions button{flex:1;height:36px;border:0;border-radius:8px;font-weight:800;cursor:pointer}.focus-btn{background:#1769aa;color:#fff}.clear-btn{background:#edf2f7;color:#24364c}.booth-label{transform:translate(-50%,-50%);text-align:center;color:#132238;text-shadow:0 1px 2px #fff,0 0 4px #fff;white-space:nowrap;pointer-events:none;line-height:1.05}.booth-label .no{display:block;font-size:10px;font-weight:900}.booth-label .name{display:none;font-size:9px;font-weight:700;max-width:92px;overflow:hidden;text-overflow:ellipsis}.booth-label.detail .name{display:block}.location-marker{display:flex;align-items:center;gap:5px;white-space:nowrap;pointer-events:none}.location-dot{width:15px;height:15px;border-radius:50%;background:#e63946;border:3px solid #fff;box-shadow:0 0 0 2px #e63946}.location-name{font-size:11px;font-weight:900;color:#b51627;text-shadow:0 1px 2px #fff,0 0 4px #fff}.error{position:absolute;inset:0;display:none;align-items:center;justify-content:center;padding:30px;text-align:center;background:#fff;z-index:20}.maplibregl-ctrl-group{border-radius:10px;overflow:hidden}
@media(max-width:760px){.top{padding:8px}.top h1{font-size:15px;width:100%}.controls{width:100%}.search-box{flex:1;min-width:0}.controls input{width:100%}.controls button{padding:0 8px}.legend{display:none}.status{left:8px;bottom:8px;max-width:calc(100vw - 16px)}.panel{right:8px;bottom:8px;width:calc(100vw - 16px)}.maplibregl-ctrl-top-right{top:4px;right:4px}}

.route-card{position:absolute;left:12px;top:12px;z-index:7;width:310px;max-width:calc(100vw - 24px);background:rgba(255,255,255,.97);border-radius:14px;box-shadow:0 10px 34px #0003;padding:12px}.route-card h3{margin:0 0 8px;font-size:14px}.route-row{display:flex;gap:6px;margin-top:6px}.route-card select,.route-card button{height:34px;border:1px solid #c8d3df;border-radius:8px;background:#fff;padding:0 8px;font-weight:700}.route-card select{flex:1;min-width:0}.route-card button{cursor:pointer}.route-go{background:#1769aa!important;color:#fff;border-color:#1769aa!important}.route-clear{background:#edf2f7!important}.route-info{font-size:11px;color:#5d6c7f;margin-top:7px;line-height:1.4}.special-marker{transform:translate(-50%,-100%);pointer-events:none;filter:drop-shadow(0 3px 5px #0005)}.special-marker .icon{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-size:20px;border:2px solid #fff;box-shadow:0 0 0 2px currentColor,0 4px 12px #0004;background:#fff}.special-marker.premium{color:#a82cff}.special-marker.awards{color:#e4a400}.special-marker.event{color:#ff5b19}.special-marker.premium .icon{animation:diamondSpin 2.2s linear infinite}.special-marker.awards .icon{animation:crownFloat 1.7s ease-in-out infinite}.special-marker.event .icon{animation:eventPulse 1.1s ease-in-out infinite alternate}@keyframes diamondSpin{to{transform:rotateY(360deg)}}@keyframes crownFloat{50%{transform:translateY(-5px) rotate(-4deg)}}@keyframes eventPulse{to{transform:scale(1.16);filter:brightness(1.25)}}.special-legend{position:absolute;right:12px;top:58px;z-index:6;background:rgba(255,255,255,.96);border-radius:10px;padding:8px 10px;box-shadow:0 3px 14px #0002;font-size:11px;line-height:1.7}.route-dot{width:17px;height:17px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px currentColor,0 3px 8px #0004}.route-dot.start{background:#18a957;color:#18a957}.route-dot.end{background:#ff5a36;color:#ff5a36}
@media(max-width:760px){.route-card{left:8px;top:8px;width:calc(100vw - 16px)}.special-legend{display:none}.route-card h3{font-size:13px}.route-info{display:none}}
</style></head>
<body><div class="app"><header class="top"><h1 id="title">FINDER MapLibre 길찾기·특별부스 시험본</h1><div class="controls">
<div class="search-box"><input id="search" autocomplete="off" placeholder="부스번호·기업명·품목 검색"><div id="results" class="results"></div></div>
<button id="searchBtn">검색</button><button id="flatBtn">평면</button><button id="threeBtn">입체</button><button id="routeBtn">경로 숨김</button><button id="resetBtn">전체보기</button>
</div></header><main class="wrap"><div id="map" class="map"></div>
<section class="route-card"><h3>길찾기 시험</h3><div class="route-row"><select id="startSelect"></select><select id="destSelect"></select></div><div class="route-row"><button id="routeGo" class="route-go">길찾기</button><button id="routeClear" class="route-clear">경로 지우기</button></div><div id="routeInfo" class="route-info">시작 위치와 목적지 부스를 선택하세요.</div></section><div class="special-legend"><b>특별부스 시험</b><br>💎 프리미엄 · 👑 어워즈 · ✨ 이벤트</div>
<div id="status" class="status">MapLibre 엔진 로딩 중…</div>
<section id="panel" class="panel"><button id="panelClose" class="panel-close">×</button><div class="eyebrow">선택 부스</div><h2 id="panelBooth">-</h2><div id="panelCompany" class="company">-</div><span id="panelCategory" class="category">-</span><div class="panel-actions"><button id="panelFocus" class="focus-btn">가까이 보기</button><button id="panelRoute" class="focus-btn">여기로 길찾기</button><button id="panelClear" class="clear-btn">선택 해제</button></div></section>
<div id="error" class="error"><div><b>MapLibre 라이브러리를 불러오지 못했습니다.</b><br><br>인터넷 연결 상태에서 실행하거나 start-local-server.bat를 실행해 주세요.</div></div>
</main></div>
<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script><script src="map-data.js"></script>
<script>
(() => {
 const data=window.FINDER_MAP_DATA; const routeGraph=window.FINDER_ROUTE_GRAPH; const specialBooths=window.FINDER_SPECIAL_BOOTHS||{}; const status=document.getElementById('status'); const panel=document.getElementById('panel'); const results=document.getElementById('results'); const input=document.getElementById('search');
 document.getElementById('title').textContent=(data.exhibitionName||'전시장')+' 전시장 안내 시스템 · MapLibre';
 if(!window.maplibregl){document.getElementById('error').style.display='flex';return;}
 const style={version:8,sources:{},layers:[{id:'background',type:'background',paint:{'background-color':'#f5f7fb'}}]};
 const map=new maplibregl.Map({container:'map',style,center:[0.055,-0.075],zoom:12,pitch:42,bearing:-22,antialias:true,maxPitch:70,dragRotate:true,pitchWithRotate:true,touchPitch:true,cooperativeGestures:false});
 map.addControl(new maplibregl.NavigationControl({visualizePitch:true}),'top-right');
 let bounds=null, selectedId=null, selectedLabel=null, routesVisible=true, activeRoute=null, activeRouteCoords=[], startMarker=null, endMarker=null, routeAnimationFrame=0, routeAnimationStarted=0; const labelMarkers=[]; const specialMarkers=[];
 function allBounds(){const b=new maplibregl.LngLatBounds();data.booths.features.forEach(f=>f.geometry.coordinates[0].forEach(c=>b.extend(c)));return b;}
 function fit(){if(!bounds)bounds=allBounds();map.fitBounds(bounds,{padding:{top:70,bottom:70,left:70,right:70},pitch:35,bearing:-15,duration:650});}
 function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
 function nearestVertex(coord){let best=null,bd=Infinity;for(const v of routeGraph.vertices){const dx=v.coord[0]-coord[0],dy=v.coord[1]-coord[1],d=dx*dx+dy*dy;if(d<bd){bd=d;best=v;}}return best;}
 function shortestPath(startId,endId){const adj=new Map();for(const v of routeGraph.vertices)adj.set(v.id,[]);for(const s of routeGraph.segments){if(s.closed)continue;const a=routeGraph.vertices.find(v=>v.id===s.source),b=routeGraph.vertices.find(v=>v.id===s.target);if(!a||!b)continue;const w=Math.hypot(a.coord[0]-b.coord[0],a.coord[1]-b.coord[1]);adj.get(a.id).push([b.id,w]);adj.get(b.id).push([a.id,w]);}const dist=new Map([[startId,0]]),prev=new Map(),open=new Set([startId]);while(open.size){let u=null,du=Infinity;for(const id of open){const d=dist.get(id)??Infinity;if(d<du){du=d;u=id;}}open.delete(u);if(u===endId)break;for(const [v,w] of adj.get(u)||[]){const nd=du+w;if(nd<(dist.get(v)??Infinity)){dist.set(v,nd);prev.set(v,u);open.add(v);}}}if(!dist.has(endId))return null;const ids=[];for(let cur=endId;cur;cur=prev.get(cur)){ids.push(cur);if(cur===startId)break;}ids.reverse();const byId=new Map(routeGraph.vertices.map(v=>[v.id,v]));return {coords:ids.map(id=>byId.get(id).coord),distance:dist.get(endId)};}
 function clearRoute(){activeRoute=null;activeRouteCoords=[];if(routeAnimationFrame){cancelAnimationFrame(routeAnimationFrame);routeAnimationFrame=0;}if(map.getSource('active-route'))map.getSource('active-route').setData({type:'FeatureCollection',features:[]});if(map.getSource('route-particles'))map.getSource('route-particles').setData({type:'FeatureCollection',features:[]});if(startMarker){startMarker.remove();startMarker=null;}if(endMarker){endMarker.remove();endMarker=null;}document.getElementById('routeInfo').textContent='시작 위치와 목적지 부스를 선택하세요.';}
 function routeTo(startCoord,dest){const sv=nearestVertex(startCoord),ev=nearestVertex(dest.coord);const found=sv&&ev?shortestPath(sv.id,ev.id):null;if(!found){setStatus('연결 가능한 경로를 찾지 못했습니다.');return;}const coords=[startCoord,...found.coords,dest.coord];activeRouteCoords=coords;activeRoute={type:'FeatureCollection',features:[{type:'Feature',properties:{},geometry:{type:'LineString',coordinates:coords}}]};map.getSource('active-route').setData(activeRoute);startRouteAnimation();clearRouteMarkersOnly();const se=document.createElement('div');se.className='route-dot start';startMarker=new maplibregl.Marker({element:se,anchor:'center'}).setLngLat(startCoord).addTo(map);const ee=document.createElement('div');ee.className='route-dot end';endMarker=new maplibregl.Marker({element:ee,anchor:'center'}).setLngLat(dest.coord).addTo(map);const rb=new maplibregl.LngLatBounds();coords.forEach(c=>rb.extend(c));map.fitBounds(rb,{padding:{top:140,bottom:100,left:70,right:70},pitch:48,bearing:map.getBearing(),duration:700});document.getElementById('routeInfo').textContent=`${dest.booth}까지 경로 표시 · 노드 ${found.coords.length}개`;setStatus(`길찾기: ${dest.booth} ${dest.name||''}`);}
 function clearRouteMarkersOnly(){if(startMarker){startMarker.remove();startMarker=null;}if(endMarker){endMarker.remove();endMarker=null;}}
 function pointAlongRoute(coords,t){if(!coords||coords.length<2)return coords?.[0]||[0,0];const lengths=[];let total=0;for(let i=1;i<coords.length;i++){const dx=coords[i][0]-coords[i-1][0],dy=coords[i][1]-coords[i-1][1];const len=Math.hypot(dx,dy);lengths.push(len);total+=len;}if(total<=0)return coords[0];let target=((t%1)+1)%1*total;for(let i=0;i<lengths.length;i++){const len=lengths[i];if(target<=len||i===lengths.length-1){const r=len?target/len:0;return [coords[i][0]+(coords[i+1][0]-coords[i][0])*r,coords[i][1]+(coords[i+1][1]-coords[i][1])*r];}target-=len;}return coords[coords.length-1];}
 function startRouteAnimation(){if(routeAnimationFrame)cancelAnimationFrame(routeAnimationFrame);routeAnimationStarted=performance.now();const animate=now=>{if(!activeRoute||!activeRouteCoords.length||!map.getSource('route-particles')){routeAnimationFrame=0;return;}const phase=((now-routeAnimationStarted)/4200)%1;const features=[];const particleCount=5;for(let i=0;i<particleCount;i++){const progress=(phase+i/particleCount)%1;features.push({type:'Feature',properties:{index:i,opacity:1-i*0.1},geometry:{type:'Point',coordinates:pointAlongRoute(activeRouteCoords,progress)}});}map.getSource('route-particles').setData({type:'FeatureCollection',features});routeAnimationFrame=requestAnimationFrame(animate);};routeAnimationFrame=requestAnimationFrame(animate);}

 function setStatus(text){status.textContent=text;}
 function clearSelected(){if(selectedId!==null&&map.getSource('booths'))map.setFeatureState({source:'booths',id:selectedId},{selected:false});selectedId=null;selectedLabel=null;panel.classList.remove('open');}
 function openSelection(item,id,coord){clearSelected();selectedId=id;selectedLabel=item;if(id!==null)map.setFeatureState({source:'booths',id},{selected:true});document.getElementById('panelBooth').textContent=item.booth||'-';document.getElementById('panelCompany').textContent=item.name||'기업명 없음';document.getElementById('panelCategory').textContent=item.category||'품목 미등록';panel.classList.add('open');setStatus(`선택: ${item.booth||''} ${item.name||''}`);if(coord)selectedLabel={...item,coord};}
 function findFeatureId(booth){const f=data.booths.features.find(x=>x.properties.booth===booth);return f?f.id:null;}
 function selectLabel(item,fly=true){const id=findFeatureId(item.booth);openSelection(item,id,item.coord);if(fly)map.easeTo({center:item.coord,zoom:17.2,pitch:48,bearing:map.getBearing(),duration:650});}
 function updateLabelDetail(){const detail=map.getZoom()>=15.4;labelMarkers.forEach(({el})=>el.classList.toggle('detail',detail));}
 map.on('load',()=>{
   map.addSource('booths',{type:'geojson',data:data.booths});
   map.addLayer({id:'booth-extrusion',type:'fill-extrusion',source:'booths',paint:{'fill-extrusion-color':['case',['boolean',['feature-state','selected'],false],'#ff7a00',['get','color']],'fill-extrusion-height':['case',['boolean',['feature-state','selected'],false],18,['get','height']],'fill-extrusion-base':0,'fill-extrusion-opacity':.94,'fill-extrusion-vertical-gradient':true}});
   map.addLayer({id:'booth-outline',type:'line',source:'booths',paint:{'line-color':['case',['boolean',['feature-state','selected'],false],'#bd3800','#59636f'],'line-width':['case',['boolean',['feature-state','selected'],false],3,1.1],'line-opacity':.9}});
   map.addSource('routes',{type:'geojson',data:data.routes});
   map.addLayer({id:'routes-glow',type:'line',source:'routes',layout:{'line-cap':'round','line-join':'round'},paint:{'line-color':'#fff','line-width':6,'line-opacity':.9}});
   map.addLayer({id:'routes',type:'line',source:'routes',layout:{'line-cap':'round','line-join':'round'},paint:{'line-color':'#2684ff','line-width':2.7,'line-opacity':.92}});
   map.addSource('active-route',{type:'geojson',lineMetrics:true,data:{type:'FeatureCollection',features:[]}});
   map.addSource('route-particles',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
   map.addLayer({id:'active-route-glow',type:'line',source:'active-route',layout:{'line-cap':'round','line-join':'round'},paint:{'line-color':'#ffffff','line-width':10,'line-opacity':.96}});
   map.addLayer({id:'active-route',type:'line',source:'active-route',layout:{'line-cap':'round','line-join':'round'},paint:{'line-gradient':['interpolate',['linear'],['line-progress'],0,'#20c7ff',0.5,'#1769ff',1,'#6b4cff'],'line-width':5,'line-opacity':1}});
   map.addLayer({id:'route-particle-glow',type:'circle',source:'route-particles',paint:{'circle-radius':9,'circle-color':'#45d6ff','circle-blur':0.75,'circle-opacity':0.55}});
   map.addLayer({id:'route-particles',type:'circle',source:'route-particles',paint:{'circle-radius':4.2,'circle-color':'#ffffff','circle-stroke-width':2.2,'circle-stroke-color':'#1769ff','circle-opacity':['coalesce',['get','opacity'],1]}});
   data.labels.forEach(l=>{const el=document.createElement('div');el.className='booth-label';el.innerHTML=`<span class="no">${escapeHtml(l.booth)}</span><span class="name">${escapeHtml(l.name||'')}</span>`;el.title=l.name||l.booth;new maplibregl.Marker({element:el,anchor:'center',pitchAlignment:'viewport',rotationAlignment:'viewport'}).setLngLat(l.coord).addTo(map);labelMarkers.push({el,item:l});});
   const iconMap={premium:'💎',awards:'👑',event:'✨'};data.labels.forEach(l=>{const kind=specialBooths[l.booth];if(!kind)return;const el=document.createElement('div');el.className=`special-marker ${kind}`;el.innerHTML=`<span class="icon">${iconMap[kind]}</span>`;el.title=`${l.booth} ${kind}`;new maplibregl.Marker({element:el,anchor:'bottom',pitchAlignment:'viewport',rotationAlignment:'viewport'}).setLngLat(l.coord).addTo(map);specialMarkers.push({el,item:l,kind});});
   data.locations.features.forEach(f=>{const el=document.createElement('div');el.className='location-marker';el.innerHTML=`<span class="location-dot"></span><span class="location-name">${escapeHtml(f.properties.name||f.properties.code||'위치')}</span>`;new maplibregl.Marker({element:el,anchor:'center',pitchAlignment:'viewport',rotationAlignment:'viewport'}).setLngLat(f.geometry.coordinates).addTo(map);});
   const startSelect=document.getElementById('startSelect');startSelect.innerHTML=data.locations.features.map((f,i)=>`<option value="${i}">${escapeHtml(f.properties.name||f.properties.code||('위치 '+(i+1)))}</option>`).join('');const destSelect=document.getElementById('destSelect');destSelect.innerHTML='<option value="">목적지 부스</option>'+data.labels.map((l,i)=>`<option value="${i}">${escapeHtml(l.booth)} · ${escapeHtml(l.name||'')}</option>`).join('');fit();updateLabelDetail();setStatus(`부스 ${data.labels.length}개 · 경로 ${data.routes.features.length}개 · 위치 ${data.locations.features.length}개`);
 });
 map.on('zoom',updateLabelDetail);
 map.on('click','booth-extrusion',e=>{const f=e.features&&e.features[0];if(!f)return;const item=data.labels.find(x=>x.booth===f.properties.booth)||{booth:f.properties.booth,name:f.properties.name,category:f.properties.category,coord:[e.lngLat.lng,e.lngLat.lat]};openSelection(item,f.id,[e.lngLat.lng,e.lngLat.lat]);});
 map.on('click',e=>{if(!map.queryRenderedFeatures(e.point,{layers:['booth-extrusion']}).length)results.classList.remove('open');});
 map.on('mouseenter','booth-extrusion',()=>map.getCanvas().style.cursor='pointer'); map.on('mouseleave','booth-extrusion',()=>map.getCanvas().style.cursor='');
 function matching(q){q=q.trim().toLowerCase();if(!q)return[];return data.labels.filter(x=>(`${x.booth} ${x.name} ${x.category}`).toLowerCase().includes(q)).slice(0,30);}
 function renderResults(){const items=matching(input.value);if(!input.value.trim()||!items.length){results.classList.remove('open');results.innerHTML='';return;}results.innerHTML=items.map((x,i)=>`<div class="result" data-i="${i}"><b>${escapeHtml(x.booth)} · ${escapeHtml(x.name||'')}</b><span>${escapeHtml(x.category||'품목 미등록')}</span></div>`).join('');results.classList.add('open');results.querySelectorAll('.result').forEach((el,i)=>el.onclick=()=>{selectLabel(items[i]);results.classList.remove('open');input.value=`${items[i].booth} ${items[i].name||''}`.trim();});}
 function search(){const found=matching(input.value)[0];if(!found){setStatus('검색 결과가 없습니다.');results.classList.remove('open');return;}selectLabel(found);results.classList.remove('open');}
 input.addEventListener('input',renderResults);input.addEventListener('focus',renderResults);input.addEventListener('keydown',e=>{if(e.key==='Enter')search();if(e.key==='Escape')results.classList.remove('open');});document.getElementById('searchBtn').onclick=search;
 document.addEventListener('pointerdown',e=>{if(!e.target.closest('.search-box'))results.classList.remove('open');});
 document.getElementById('flatBtn').onclick=()=>map.easeTo({pitch:0,bearing:0,duration:550});document.getElementById('threeBtn').onclick=()=>map.easeTo({pitch:52,bearing:-28,duration:550});document.getElementById('resetBtn').onclick=()=>{clearSelected();fit();};
 document.getElementById('routeBtn').onclick=e=>{routesVisible=!routesVisible;['routes','routes-glow'].forEach(id=>map.setLayoutProperty(id,'visibility',routesVisible?'visible':'none'));e.currentTarget.textContent=routesVisible?'경로 숨김':'경로 표시';};
 document.getElementById('panelClose').onclick=clearSelected;document.getElementById('panelClear').onclick=clearSelected;document.getElementById('panelFocus').onclick=()=>{if(selectedLabel?.coord)map.easeTo({center:selectedLabel.coord,zoom:18,pitch:52,bearing:map.getBearing(),duration:550});};
 document.getElementById('routeGo').onclick=()=>{const si=Number(document.getElementById('startSelect').value||0),di=document.getElementById('destSelect').value;if(di===''){setStatus('목적지 부스를 선택하세요.');return;}routeTo(data.locations.features[si].geometry.coordinates,data.labels[Number(di)]);};
 document.getElementById('routeClear').onclick=clearRoute;
 document.getElementById('panelRoute').onclick=()=>{if(!selectedLabel?.coord)return;const idx=data.labels.findIndex(x=>x.booth===selectedLabel.booth);if(idx>=0)document.getElementById('destSelect').value=String(idx);const si=Number(document.getElementById('startSelect').value||0);routeTo(data.locations.features[si].geometry.coordinates,selectedLabel);};
 window.addEventListener('resize',()=>map.resize());
})();
</script></body></html>
